name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  FTP-Deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PHP & Composer Dependencies
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, curl, bcmath, sqlite3
      
      - name: Install Composer Dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Setup Node.js & Build
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install NPM dependencies and build
        run: |
          npm ci
          npm run build

      # NEW: This step zips everything into ONE file (takes 5 seconds)
      - name: Create Zip Archive
        run: zip -r deploy.zip . -x ".git*" ".github/*" "node_modules/*"

      # UPDATED: Uploads ONLY the zip and the extractor script
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: /public_html/
          exclude: |
            **/*
            !deploy.zip
            !extract.php

      # NEW: Tells cPanel to run the unzip script
      - name: Trigger Unzip
        run: curl -s https://dpdc539.dpdatacenter.com
