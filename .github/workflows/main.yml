name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  FTP-Deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      # 1. Get the latest code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup PHP and install dependencies (Crucial for vendor folder)
      - name: Install PHP & Composer Dependencies
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, curl, bcmath, sqlite3
      
      - name: Install Composer Dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader

      # 3. Setup Node and build assets
      - name: Setup Node.js & Build
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install NPM dependencies and build
        run: |
          npm ci
          npm run build

      # 4. ZIP EVERYTHING (Fixed: explicitly including vendor)
      - name: Create Zip Archive
        run: zip -r deploy.zip . -x ".git/*" ".github/*" "node_modules/*" "tests/*"

      # 5. UPLOAD ONLY ZIP AND EXTRACTOR
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: /public_html/
          exclude: |
            **/*
            !deploy.zip
            !extract.php

      # 6. TRIGGER EXTRACTION (Fixed: added -k for SSL and added /extract.php)
      - name: Trigger Unzip
        run: curl -k -s https://dpdc539.dpdatacenter.com
