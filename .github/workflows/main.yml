name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  FTP-Deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install dependencies (optional, if you want to build assets before deploying)
      - name: Install PHP & Composer Dependencies
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, curl, bcmath, sqlite3
      - name: Install Composer Dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Setup Node.js & Build
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          npm ci
          npm run build

      # 3. Deploy via FTP
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: ./          # path to your project root
          server-dir: /public_html/ # target folder on cPanel
          exclude: |
            .github/
            node_modules/
            tests/
            .gitignore
