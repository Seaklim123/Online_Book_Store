name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  FTP-Deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      # 1. Get the latest code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Build process (PHP/Composer)
      - name: Install PHP & Composer Dependencies
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, curl, bcmath, sqlite3
      
      - name: Install Composer Dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader

      # 3. Build process (Node.js/NPM)
      - name: Setup Node.js & Build
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install NPM dependencies and build
        run: |
          npm ci
          npm run build

      # 4. Sync files to cPanel server
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          # Use './' to deploy everything, or './dist' to only deploy built assets
          local-dir: ./ 
          # Ensure this matches your cPanel path (e.g., /public_html/ or /public_html/subfolder/)
          server-dir: /public_html/ 
          # Exclude files you don't want on the live server
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/tests/**
            .gitignore
            README.md
