name: Laravel CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - uses: actions/checkout@v4

    # 2. Setup PHP
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, dom, curl, libxml, bcmath, sqlite3
        coverage: none

    # 3. Setup Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 4. Install Composer dependencies
    - name: Install Composer Dependencies
      run: npm install --legacy-peer-deps
      run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader

    # 5. Install Node dependencies & build assets
    - name: Install NPM & Build
      run: |
        npm ci
        npm run build

    # 6. Prepare Laravel environment
    - name: Prepare Laravel Environment
      run: |
        php -r "file_exists('.env') || copy('.env.example', '.env');"
        php artisan key:generate
        mkdir -p storage/framework/{sessions,views,cache} bootstrap/cache
        chmod -R 777 storage bootstrap/cache
        mkdir -p database
        touch database/database.sqlite

    # 7. Run tests (sequential, safe)
    - name: Execute Tests
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
        CACHE_STORE: array
        SESSION_DRIVER: array
        VITE_ENABLED: false
      run: php artisan test
